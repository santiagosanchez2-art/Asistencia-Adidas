<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Control de asistencia · Adidas</title>
<style>
  body { font-family: Arial, sans-serif; text-align: center; padding: 60px 24px; background: #111; color: #fff; min-height: 100vh; margin: 0; }
  h1 { font-size: 22px; margin-bottom: 12px; }
  p { color: #bbb; font-size: 14px; line-height: 1.5; }
  .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; margin: 30px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #f88; }
</style>
</head>
<body>
<h1>Obteniendo tu ubicación…</h1>
<p id="status">Toca <b>Permitir</b> cuando el navegador te lo pida.</p>
<div class="spinner" id="spinner"></div>
<script>
  const FORM_BASE = "https://forms.office.com/Pages/ResponsePage.aspx?id=IrL-OyzkNUWqzupvd1E2mz0FagzEhKVGlbPbrPLqBZNUQkgyQUEzVk8yRzNYMURDSEIzTTkzR0MwWi4u";
  const ID_LAT = "rd1777c06b8b647d39e742ed849c0a570";
  const ID_LNG = "r93611f5cd0924620abd72efdf7c9cff0";

  if (!navigator.geolocation) {
    showError("Este navegador no soporta GPS. Abre el link en un celular moderno.");
  } else {
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        var lat = pos.coords.latitude.toFixed(6);
        var lng = pos.coords.longitude.toFixed(6);
        var url = FORM_BASE + "&" + ID_LAT + "=" + lat + "&" + ID_LNG + "=" + lng;
        window.location.href = url;
      },
      function(err) {
        var msg = "No se pudo obtener la ubicación. ";
        if (err.code === 1) msg += "Permiso denegado. Ve a configuración del navegador y habilita ubicación.";
        else if (err.code === 2) msg += "GPS no disponible. Sal a un lugar con mejor señal.";
        else if (err.code === 3) msg += "El GPS tardó demasiado. Vuelve a intentar.";
        showError(msg);
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  }

  function showError(msg) {
    document.getElementById("spinner").style.display = "none";
    var s = document.getElementById("status");
    s.innerHTML = msg + '<br><br><a href="javascript:location.reload()" style="color:#0CA678">Reintentar</a>';
    s.className = "error";
  }
</script>
</body>
</html>
