<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Toma de Asistencia · Adidas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: #ffffff;
    color: #111111;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .brand {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 6px;
    color: #111;
  }
  .subtitle {
    font-size: 14px;
    color: #666;
    margin-bottom: 48px;
  }
  .rule {
    width: 48px;
    height: 3px;
    background: #111;
    margin: 0 auto 48px auto;
  }
  .status-box {
    border: 1.5px solid #e2e2e2;
    border-radius: 12px;
    padding: 36px 24px;
    margin-bottom: 24px;
  }
  .spinner {
    width: 44px;
    height: 44px;
    border: 3px solid #eee;
    border-top-color: #111;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin: 0 auto 20px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-title {
    font-size: 17px;
    font-weight: 600;
    color: #111;
    margin-bottom: 6px;
  }
  .status-desc {
    font-size: 13px;
    color: #888;
    line-height: 1.5;
  }
  .check {
    width: 44px;
    height: 44px;
    margin: 0 auto 20px auto;
    border-radius: 50%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 22px;
  }
  .error-icon {
    background: #fff;
    border: 2px solid #d33;
    color: #d33;
  }
  .footer {
    font-size: 11px;
    color: #bbb;
    margin-top: 16px;
  }
  .retry {
    display: inline-block;
    margin-top: 16px;
    padding: 12px 28px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="brand">Adidas México</div>
  <h1>Toma de asistencia</h1>
  <div class="subtitle">Validador de ubicación GPS</div>
  <div class="rule"></div>

  <div class="status-box" id="box">
    <div class="spinner" id="spinner"></div>
    <div class="status-title" id="title">Validando tu ubicación</div>
    <div class="status-desc" id="desc">Toca <b>Permitir</b> cuando el navegador solicite acceso a tu ubicación.</div>
  </div>

  <div class="footer">Tu ubicación se usa solo para validar tu asistencia.</div>
</div>

<script>
  var FORM_BASE = "https://forms.office.com/Pages/ResponsePage.aspx?id=IrL-OyzkNUWqzupvd1E2mz0FagzEhKVGlbPbrPLqBZNUQkgyQUEzVk8yRzNYMURDSEIzTTkzR0MwWi4u";
  var ID_LAT = "rd1777c06b8b647d39e742ed849c0a570";
  var ID_LNG = "r93611f5cd0924620abd72efdf7c9cff0";

  function showError(msg) {
    document.getElementById("spinner").style.display = "none";
    document.getElementById("box").innerHTML =
      '<div class="check error-icon">!</div>' +
      '<div class="status-title">No se pudo validar</div>' +
      '<div class="status-desc">' + msg + '</div>' +
      '<a href="javascript:location.reload()" class="retry">Reintentar</a>';
  }

  function showSuccess() {
    document.getElementById("spinner").style.display = "none";
    document.getElementById("box").innerHTML =
      '<div class="check">&#10003;</div>' +
      '<div class="status-title">Ubicación validada</div>' +
      '<div class="status-desc">Abriendo el formulario de registro...</div>';
  }

  if (!navigator.geolocation) {
    showError("Tu dispositivo no soporta ubicación. Usa un teléfono con GPS.");
  } else {
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        var lat = pos.coords.latitude.toFixed(6);
        var lng = pos.coords.longitude.toFixed(6);
        showSuccess();
        var url = FORM_BASE + "&" + ID_LAT + "=" + lat + "&" + ID_LNG + "=" + lng;
        setTimeout(function() { window.location.href = url; }, 1200);
      },
      function(err) {
        var msg = "No se pudo obtener tu ubicación. ";
        if (err.code === 1) msg = "Permiso de ubicación denegado. Habilítalo en los ajustes de tu navegador e intenta de nuevo.";
        else if (err.code === 2) msg = "Señal GPS no disponible. Muévete a un lugar con mejor recepción.";
        else if (err.code === 3) msg = "La ubicación tardó demasiado. Vuelve a intentar.";
        showError(msg);
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  }
</script>
</body>
</html>
